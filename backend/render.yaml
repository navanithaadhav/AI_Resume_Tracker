# Render Blueprint for Backend
# See https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-resume-analyzer-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false  # Set this after deploying frontend
      - key: GEMINI_API_KEY
        sync: false  # Set this manually in Render dashboard
