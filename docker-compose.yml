version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-resume-analyzer-backend
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MAX_FILE_SIZE=10485760
      - UPLOAD_DIR=./uploads
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - ai-resume-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:10000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-resume-analyzer-frontend
    ports:
      - "3001:3001"
    environment:
      - REACT_APP_API_URL=http://backend:10000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-resume-network

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: ai-resume-analyzer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - ai-resume-network

networks:
  ai-resume-network:
    driver: bridge

volumes:
  uploads:
